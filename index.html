<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: var(--font-sans); font-size: 16px; }
  .container { padding: 0.75rem 0; }
  
  /* Tabs */
  .tabs { display: flex; gap: 6px; background: var(--color-background-secondary); padding: 4px; border-radius: var(--border-radius-md); margin-bottom: 1rem; }
  .tab-btn { flex: 1; padding: 10px 8px; border: none; background: transparent; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; color: var(--color-text-secondary); transition: all 0.15s; }
  .tab-btn.active { background: var(--color-background-primary); color: var(--color-text-primary); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  
  /* Match list */
  .matches-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 1rem; }
  .match-summary { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px; cursor: pointer; transition: all 0.15s; }
  .match-summary:hover { border-color: var(--color-border-secondary); }
  .match-summary.active { border: 2px solid var(--color-border-info); padding: 11px; }
  .match-summary.completed { background: var(--color-background-secondary); }
  .match-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .match-num { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }
  .match-status { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
  .status-pending { background: var(--color-background-warning); color: var(--color-text-warning); }
  .status-done { background: var(--color-background-success); color: var(--color-text-success); }
  .match-teams { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .match-team { font-size: 15px; font-weight: 500; flex: 1; }
  .match-team.left { text-align: right; }
  .match-team.right { text-align: left; }
  .match-team.winner { color: var(--color-text-primary); }
  .match-team.loser { color: var(--color-text-tertiary); }
  .match-score { font-size: 22px; font-weight: 500; padding: 0 4px; min-width: 70px; text-align: center; }
  .match-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--color-border-tertiary); }
  .match-actions button { flex: 1; padding: 6px; font-size: 12px; border: 0.5px solid var(--color-border-tertiary); background: transparent; border-radius: 6px; cursor: pointer; color: var(--color-text-secondary); }
  .match-actions button.danger { color: var(--color-text-danger); border-color: var(--color-border-danger); }
  
  /* Match editor */
  .editor { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .editor-title { font-size: 16px; font-weight: 500; margin: 0 0 1rem 0; }
  .team-selectors { display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 1rem; }
  .vs-text { font-size: 12px; color: var(--color-text-secondary); }
  select { width: 100%; padding: 10px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); font-size: 14px; background: var(--color-background-primary); color: var(--color-text-primary); }
  select:focus { outline: none; border-color: var(--color-border-info); }
  
  /* Live score */
  .live-score { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 14px 12px; margin-bottom: 1rem; }
  .live-score-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 8px; }
  .live-team-name { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .live-team-left { text-align: right; }
  .live-team-right { text-align: left; }
  .live-score-value { font-size: 36px; font-weight: 500; line-height: 1; }
  .live-divider { font-size: 18px; color: var(--color-text-tertiary); padding: 0 8px; }
  
  /* Team counter blocks */
  .team-block { margin-bottom: 12px; }
  .team-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 0 2px; }
  .team-block-name { font-size: 14px; font-weight: 500; }
  .team-block-ratio { font-size: 11px; color: var(--color-text-secondary); }
  .team-block-ratio.bonus { color: var(--color-text-success); font-weight: 500; }
  .counters { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .counter { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 6px; text-align: center; position: relative; overflow: hidden; }
  .counter-label { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
  .counter-value { font-size: 22px; font-weight: 500; margin-bottom: 6px; min-height: 26px; }
  .counter-buttons { display: flex; gap: 4px; justify-content: center; }
  .counter-btn { width: 28px; height: 28px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; display: flex; align-items: center; justify-content: center; color: var(--color-text-primary); padding: 0; }
  .counter-btn:hover { background: var(--color-background-tertiary); }
  .counter-btn:active { transform: scale(0.92); }
  .counter.goal { background: var(--color-background-success); }
  .counter.goal .counter-label, .counter.goal .counter-value { color: var(--color-text-success); }
  
  /* Result selector */
  .result-section { margin-top: 1rem; padding-top: 1rem; border-top: 0.5px solid var(--color-border-tertiary); }
  .result-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
  .result-buttons { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .result-btn { padding: 10px 6px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); border-radius: var(--border-radius-md); font-size: 12px; font-weight: 500; cursor: pointer; color: var(--color-text-primary); line-height: 1.3; }
  .result-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); }
  
  /* Add button */
  .btn-add { width: 100%; padding: 14px; background: var(--color-background-info); color: var(--color-text-info); border: 0.5px solid var(--color-border-info); border-radius: var(--border-radius-md); font-weight: 500; cursor: pointer; font-size: 14px; }
  .btn-add:hover { background: var(--color-background-secondary); }
  
  /* Ranking */
  .ranking-header { display: grid; grid-template-columns: 32px 1fr 36px 36px 36px 36px 36px; gap: 6px; padding: 8px 4px; font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.3px; font-weight: 500; border-bottom: 0.5px solid var(--color-border-secondary); }
  .ranking-row { display: grid; grid-template-columns: 32px 1fr 36px 36px 36px 36px 36px; gap: 6px; padding: 12px 4px; border-bottom: 0.5px solid var(--color-border-tertiary); align-items: center; font-size: 13px; }
  .ranking-row:last-child { border-bottom: none; }
  .rank-pos { font-size: 16px; font-weight: 500; }
  .rank-pos.top1 { color: var(--color-text-warning); }
  .rank-pos.top2 { color: var(--color-text-secondary); }
  .rank-pos.top3 { color: var(--color-text-warning); opacity: 0.7; }
  .rank-team { font-size: 14px; font-weight: 500; }
  .rank-cell { text-align: center; font-variant-numeric: tabular-nums; }
  .rank-cell.pts { font-weight: 500; font-size: 15px; }
  
  /* Empty state */
  .empty-state { padding: 2rem 1rem; text-align: center; color: var(--color-text-secondary); font-size: 14px; background: var(--color-background-secondary); border-radius: var(--border-radius-md); }
  
  /* Stats summary */
  .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .stat-summary { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px; text-align: center; }
  .stat-summary-label { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
  .stat-summary-value { font-size: 18px; font-weight: 500; }
  
  /* Header */
  .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .app-title { font-size: 18px; font-weight: 500; margin: 0; }
  .app-subtitle { font-size: 12px; color: var(--color-text-secondary); margin: 2px 0 0 0; }
  .reset-btn { padding: 6px 10px; background: transparent; border: 0.5px solid var(--color-border-tertiary); border-radius: 6px; font-size: 11px; cursor: pointer; color: var(--color-text-secondary); }
</style>

<div class="container">
  <div class="app-header">
    <div>
      <div class="app-title">⚽ Tournoi football</div>
      <div class="app-subtitle" id="appSubtitle">6 équipes · 0 match</div>
    </div>
    <button class="reset-btn" onclick="resetAll()">Réinitialiser</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('live')">Match en cours</button>
    <button class="tab-btn" onclick="switchTab('all')">Tous les matchs</button>
    <button class="tab-btn" onclick="switchTab('ranking')">Classement</button>
  </div>

  <div id="live" class="tab-content active">
    <div id="liveEditor"></div>
  </div>

  <div id="all" class="tab-content">
    <div class="matches-list" id="matchesList"></div>
    <button class="btn-add" onclick="addAndOpenMatch()">+ Nouveau match</button>
  </div>

  <div id="ranking" class="tab-content">
    <div class="stats-summary" id="statsSummary"></div>
    <div id="rankingContainer"></div>
  </div>
</div>

<script>
  const TEAMS = ['1-A', '1-B', '2-A', '2-B', '3-A', '3-B'];
  
  let matches = [];
  let matchIdCounter = 0;
  let activeMatchId = null;

  function loadState() {
    try {
      const saved = localStorage.getItem('footballTournament');
      if (saved) {
        const state = JSON.parse(saved);
        matches = state.matches || [];
        matchIdCounter = state.counter || 0;
        activeMatchId = state.active || null;
      }
    } catch(e) {}
  }

  function saveState() {
    try {
      localStorage.setItem('footballTournament', JSON.stringify({
        matches, counter: matchIdCounter, active: activeMatchId
      }));
    } catch(e) {}
  }

  function newMatch() {
    return {
      id: matchIdCounter++,
      team1: TEAMS[0],
      team2: TEAMS[1],
      team1_perte: 0,
      team1_tire_rate: 0,
      team1_but: 0,
      team2_perte: 0,
      team2_tire_rate: 0,
      team2_but: 0,
      result: 'pending'
    };
  }

  function addMatch() {
    const m = newMatch();
    matches.push(m);
    return m.id;
  }

  function addAndOpenMatch() {
    const id = addMatch();
    activeMatchId = id;
    saveState();
    switchTab('live');
  }

  function deleteMatch(id) {
    matches = matches.filter(m => m.id !== id);
    if (activeMatchId === id) activeMatchId = null;
    saveState();
    renderAll();
  }

  function openMatch(id) {
    activeMatchId = id;
    saveState();
    switchTab('live');
  }

  function getTeamStats(match, isTeam1) {
    const prefix = isTeam1 ? 'team1' : 'team2';
    const perte = match[`${prefix}_perte`];
    const tireRate = match[`${prefix}_tire_rate`];
    const but = match[`${prefix}_but`];
    const totalShots = tireRate + but;
    const totalPossessions = perte + totalShots;
    const ratio = totalPossessions > 0 ? Math.round(totalShots / totalPossessions * 100) : 0;
    const hasBonus = totalPossessions > 0 && (totalShots / totalPossessions) >= 0.5;
    return { perte, tireRate, but, totalShots, totalPossessions, ratio, hasBonus };
  }

  function increment(matchId, field, delta) {
    const m = matches.find(x => x.id === matchId);
    if (!m) return;
    m[field] = Math.max(0, m[field] + delta);
    saveState();
    renderAll();
  }

  function updateMatch(matchId, field, value) {
    const m = matches.find(x => x.id === matchId);
    if (!m) return;
    m[field] = value;
    saveState();
    renderAll();
  }

  function setResult(matchId, result) {
    const m = matches.find(x => x.id === matchId);
    if (!m) return;
    m.result = m.result === result ? 'pending' : result;
    saveState();
    renderAll();
  }

  function renderLiveEditor() {
    const container = document.getElementById('liveEditor');
    let match = matches.find(m => m.id === activeMatchId);
    
    if (!match) {
      if (matches.length === 0) {
        container.innerHTML = `
          <div class="empty-state" style="margin-bottom: 1rem;">
            Aucun match créé. Commencez votre tournoi !
          </div>
          <button class="btn-add" onclick="addAndOpenMatch()">+ Premier match</button>
        `;
      } else {
        container.innerHTML = `
          <div class="empty-state" style="margin-bottom: 1rem;">
            Sélectionnez un match dans l'onglet "Tous les matchs"
          </div>
          <button class="btn-add" onclick="addAndOpenMatch()">+ Nouveau match</button>
        `;
      }
      return;
    }

    const idx = matches.findIndex(m => m.id === match.id);
    const s1 = getTeamStats(match, true);
    const s2 = getTeamStats(match, false);

    container.innerHTML = `
      <div class="editor">
        <div class="editor-title">Match ${idx + 1}</div>
        
        <div class="team-selectors">
          <select onchange="updateMatch(${match.id}, 'team1', this.value)">
            ${TEAMS.map(t => `<option ${t === match.team1 ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
          <span class="vs-text">VS</span>
          <select onchange="updateMatch(${match.id}, 'team2', this.value)">
            ${TEAMS.map(t => `<option ${t === match.team2 ? 'selected' : ''}>${t}</option>`).join('')}
          </select>
        </div>

        <div class="live-score">
          <div class="live-score-row">
            <div class="live-team-left">
              <div class="live-team-name">${match.team1}</div>
              <div class="live-score-value">${s1.but}</div>
            </div>
            <div class="live-divider">−</div>
            <div class="live-team-right">
              <div class="live-team-name">${match.team2}</div>
              <div class="live-score-value">${s2.but}</div>
            </div>
          </div>
        </div>

        ${renderTeamBlock(match, true, s1)}
        ${renderTeamBlock(match, false, s2)}

        <div class="result-section">
          <div class="result-label">Résultat final</div>
          <div class="result-buttons">
            <button class="result-btn ${match.result === 'team1_win' ? 'active' : ''}" onclick="setResult(${match.id}, 'team1_win')">${match.team1}</button>
            <button class="result-btn ${match.result === 'draw' ? 'active' : ''}" onclick="setResult(${match.id}, 'draw')">Nul</button>
            <button class="result-btn ${match.result === 'team2_win' ? 'active' : ''}" onclick="setResult(${match.id}, 'team2_win')">${match.team2}</button>
          </div>
        </div>
      </div>
      
      <button class="btn-add" onclick="addAndOpenMatch()">+ Nouveau match</button>
    `;
  }

  function renderTeamBlock(match, isTeam1, stats) {
    const prefix = isTeam1 ? 'team1' : 'team2';
    const teamName = isTeam1 ? match.team1 : match.team2;
    const bonusClass = stats.hasBonus ? 'bonus' : '';
    const bonusText = stats.totalPossessions === 0 ? '' : 
      `${stats.totalShots}/${stats.totalPossessions} possessions · ${stats.ratio}% ${stats.hasBonus ? '✓ bonus' : ''}`;
    
    return `
      <div class="team-block">
        <div class="team-block-header">
          <div class="team-block-name">${teamName}</div>
          <div class="team-block-ratio ${bonusClass}">${bonusText}</div>
        </div>
        <div class="counters">
          <div class="counter">
            <div class="counter-label">Pertes</div>
            <div class="counter-value">${stats.perte}</div>
            <div class="counter-buttons">
              <button class="counter-btn" onclick="increment(${match.id}, '${prefix}_perte', -1)">−</button>
              <button class="counter-btn" onclick="increment(${match.id}, '${prefix}_perte', 1)">+</button>
            </div>
          </div>
          <div class="counter">
            <div class="counter-label">Tirs ratés</div>
            <div class="counter-value">${stats.tireRate}</div>
            <div class="counter-buttons">
              <button class="counter-btn" onclick="increment(${match.id}, '${prefix}_tire_rate', -1)">−</button>
              <button class="counter-btn" onclick="increment(${match.id}, '${prefix}_tire_rate', 1)">+</button>
            </div>
          </div>
          <div class="counter goal">
            <div class="counter-label">Buts</div>
            <div class="counter-value">${stats.but}</div>
            <div class="counter-buttons">
              <button class="counter-btn" onclick="increment(${match.id}, '${prefix}_but', -1)">−</button>
              <button class="counter-btn" onclick="increment(${match.id}, '${prefix}_but', 1)">+</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderMatchesList() {
    const container = document.getElementById('matchesList');
    
    if (matches.length === 0) {
      container.innerHTML = '<div class="empty-state">Aucun match enregistré</div>';
      return;
    }

    container.innerHTML = matches.map((m, idx) => {
      const s1 = getTeamStats(m, true);
      const s2 = getTeamStats(m, false);
      const isActive = m.id === activeMatchId;
      const isDone = m.result !== 'pending';
      
      let team1Class = '', team2Class = '';
      if (m.result === 'team1_win') { team1Class = 'winner'; team2Class = 'loser'; }
      else if (m.result === 'team2_win') { team1Class = 'loser'; team2Class = 'winner'; }
      
      return `
        <div class="match-summary ${isActive ? 'active' : ''} ${isDone ? 'completed' : ''}">
          <div class="match-top">
            <span class="match-num">Match ${idx + 1}</span>
            <span class="match-status ${isDone ? 'status-done' : 'status-pending'}">
              ${isDone ? 'Terminé' : 'En cours'}
            </span>
          </div>
          <div class="match-teams" onclick="openMatch(${m.id})">
            <div class="match-team left ${team1Class}">${m.team1}</div>
            <div class="match-score">${s1.but} − ${s2.but}</div>
            <div class="match-team right ${team2Class}">${m.team2}</div>
          </div>
          <div class="match-actions">
            <button onclick="openMatch(${m.id})">Modifier</button>
            <button class="danger" onclick="deleteMatch(${m.id})">Supprimer</button>
          </div>
        </div>
      `;
    }).join('');
  }

  function getPoints(result, hasBonus) {
    if (result === 'win') return hasBonus ? 6 : 5;
    if (result === 'draw') return hasBonus ? 4 : 3;
    if (result === 'loss') return hasBonus ? 2 : 1;
    return 0;
  }

  function calculateStandings() {
    const standings = {};
    TEAMS.forEach(team => {
      standings[team] = { team, pts: 0, played: 0, wins: 0, draws: 0, losses: 0, gf: 0, ga: 0, tirRate: 0, perte: 0 };
    });

    matches.forEach(m => {
      if (m.result === 'pending') return;

      const s1 = getTeamStats(m, true);
      const s2 = getTeamStats(m, false);

      standings[m.team1].gf += s1.but;
      standings[m.team1].ga += s2.but;
      standings[m.team1].tirRate += s1.tireRate;
      standings[m.team1].perte += s1.perte;
      standings[m.team1].played++;

      standings[m.team2].gf += s2.but;
      standings[m.team2].ga += s1.but;
      standings[m.team2].tirRate += s2.tireRate;
      standings[m.team2].perte += s2.perte;
      standings[m.team2].played++;

      if (m.result === 'team1_win') {
        standings[m.team1].pts += getPoints('win', s1.hasBonus);
        standings[m.team2].pts += getPoints('loss', s2.hasBonus);
        standings[m.team1].wins++;
        standings[m.team2].losses++;
      } else if (m.result === 'team2_win') {
        standings[m.team2].pts += getPoints('win', s2.hasBonus);
        standings[m.team1].pts += getPoints('loss', s1.hasBonus);
        standings[m.team2].wins++;
        standings[m.team1].losses++;
      } else {
        standings[m.team1].pts += getPoints('draw', s1.hasBonus);
        standings[m.team2].pts += getPoints('draw', s2.hasBonus);
        standings[m.team1].draws++;
        standings[m.team2].draws++;
      }
    });

    return Object.values(standings).sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      const diffA = a.gf - a.ga;
      const diffB = b.gf - b.ga;
      if (diffB !== diffA) return diffB - diffA;
      return b.gf - a.gf;
    });
  }

  function renderRanking() {
    const standing = calculateStandings();
    const container = document.getElementById('rankingContainer');
    const summary = document.getElementById('statsSummary');
    
    const completedMatches = matches.filter(m => m.result !== 'pending').length;
    const totalGoals = matches.reduce((sum, m) => sum + m.team1_but + m.team2_but, 0);
    
    summary.innerHTML = `
      <div class="stat-summary">
        <div class="stat-summary-label">Matchs joués</div>
        <div class="stat-summary-value">${completedMatches}</div>
      </div>
      <div class="stat-summary">
        <div class="stat-summary-label">Buts marqués</div>
        <div class="stat-summary-value">${totalGoals}</div>
      </div>
    `;
    
    if (standing.every(s => s.played === 0)) {
      container.innerHTML = '<div class="empty-state">Le classement apparaîtra après le premier match terminé</div>';
      return;
    }

    const headerRow = `
      <div class="ranking-header">
        <div></div>
        <div>Équipe</div>
        <div class="rank-cell">Pts</div>
        <div class="rank-cell">J</div>
        <div class="rank-cell">G/N/P</div>
        <div class="rank-cell">Buts</div>
        <div class="rank-cell">Diff</div>
      </div>
    `;

    const rows = standing.map((s, idx) => {
      const rankClass = idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : '';
      const diff = s.gf - s.ga;
      const diffStr = diff > 0 ? `+${diff}` : `${diff}`;
      
      return `
        <div class="ranking-row">
          <div class="rank-pos ${rankClass}">${idx + 1}</div>
          <div class="rank-team">${s.team}</div>
          <div class="rank-cell pts">${s.pts}</div>
          <div class="rank-cell">${s.played}</div>
          <div class="rank-cell" style="font-size: 11px;">${s.wins}/${s.draws}/${s.losses}</div>
          <div class="rank-cell">${s.gf}:${s.ga}</div>
          <div class="rank-cell">${diffStr}</div>
        </div>
      `;
    }).join('');

    container.innerHTML = headerRow + rows;
  }

  function updateSubtitle() {
    const done = matches.filter(m => m.result !== 'pending').length;
    document.getElementById('appSubtitle').textContent = `6 équipes · ${matches.length} match${matches.length > 1 ? 's' : ''} · ${done} terminé${done > 1 ? 's' : ''}`;
  }

  function renderAll() {
    renderLiveEditor();
    renderMatchesList();
    renderRanking();
    updateSubtitle();
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    const btn = document.querySelector(`button[onclick="switchTab('${tab}')"]`);
    if (btn) btn.classList.add('active');
  }

  function resetAll() {
    if (confirm('Réinitialiser le tournoi ? Tous les matchs seront supprimés.')) {
      matches = [];
      matchIdCounter = 0;
      activeMatchId = null;
      saveState();
      renderAll();
    }
  }

  loadState();
  if (matches.length === 0) {
    addMatch();
    activeMatchId = matches[0].id;
  }
  renderAll();
</script>
